<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0c;
    --bg-secondary: #111115;
    --bg-card: #16161b;
    --bg-card-hover: #1c1c22;
    --border: #2a2a32;
    --border-light: #3a3a44;
    --text-primary: #e8e6e3;
    --text-secondary: #8a8a96;
    --text-muted: #5a5a66;
    --accent-gold: #d4a853;
    --accent-gold-dim: #b8923e;
    --accent-gold-glow: rgba(212, 168, 83, 0.15);
    --accent-green: #4ade80;
    --accent-red: #f87171;
    --accent-blue: #60a5fa;
    --accent-purple: #a78bfa;
    --accent-orange: #fb923c;
    --accent-cyan: #22d3ee;
    --accent-pink: #f472b6;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(212,168,83,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(212,168,83,0.02) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none;
  }
  .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── IFRAME WARNING ── */
  .iframe-warning {
    text-align: center; padding: 60px 32px;
    animation: fadeUp 0.5s ease both;
  }
  .iframe-warning-icon { font-size: 56px; margin-bottom: 20px; }
  .iframe-warning h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px;
    color: var(--accent-gold); margin-bottom: 14px;
  }
  .iframe-warning p { font-size: 15px; color: var(--text-secondary); line-height: 1.7; max-width: 500px; margin: 0 auto 20px; }
  .iframe-warning .step-list {
    text-align: left; max-width: 420px; margin: 0 auto;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary);
    line-height: 2.2;
  }
  .iframe-warning .step-num {
    display: inline-block; width: 24px; height: 24px;
    background: var(--accent-gold-glow); color: var(--accent-gold);
    border-radius: 6px; text-align: center; line-height: 24px;
    font-size: 11px; margin-right: 10px;
  }

  /* ── SETUP ── */
  .setup-banner {
    background: linear-gradient(135deg, rgba(212,168,83,0.08), rgba(212,168,83,0.03));
    border: 1px solid var(--accent-gold-dim); border-radius: var(--radius);
    padding: 24px; margin-bottom: 32px; animation: fadeUp 0.5s ease both;
  }
  .setup-banner h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: var(--accent-gold); margin-bottom: 10px; }
  .setup-banner p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 14px; }
  .setup-banner code { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: var(--accent-gold); }
  .setup-row { display: flex; gap: 10px; }
  .setup-input {
    flex: 1; padding: 12px 16px; background: var(--bg-primary);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    outline: none; transition: border-color 0.25s ease;
  }
  .setup-input::placeholder { color: var(--text-muted); }
  .setup-input:focus { border-color: var(--accent-gold-dim); box-shadow: 0 0 0 3px var(--accent-gold-glow); }
  .setup-btn {
    padding: 12px 24px; background: var(--accent-gold); border: none; border-radius: 8px;
    color: var(--bg-primary); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
  }
  .setup-btn:hover { background: var(--accent-gold-dim); transform: translateY(-1px); }

  /* ── SYNC BAR ── */
  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
    animation: fadeUp 0.4s ease 0.1s both;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s ease; flex-shrink: 0; }
  .sync-dot.live { background: var(--accent-green); animation: pulse 2s ease infinite; }
  .sync-dot.syncing { background: var(--accent-gold); animation: pulse 0.6s ease infinite; }
  .sync-dot.error { background: var(--accent-red); }
  .sync-actions { margin-left: auto; display: flex; gap: 6px; }
  .sync-btn {
    padding: 4px 12px; background: transparent; border: 1px solid var(--border); border-radius: 5px;
    color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .sync-btn:hover { border-color: var(--accent-gold-dim); color: var(--accent-gold); }
  .sync-btn.danger { color: var(--accent-red); border-color: rgba(248,113,113,0.2); }
  .sync-btn.danger:hover { border-color: var(--accent-red); }

  /* ── HEADER ── */
  .header { margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
  .header-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent-gold);
    margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
  }
  .header-label::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--accent-gold); }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px,8vw,72px); letter-spacing: 2px; line-height: 0.95; margin-bottom: 12px; }
  .header h1 span { color: var(--accent-gold); }
  .header-subtitle { font-size: 14px; color: var(--text-secondary); max-width: 600px; line-height: 1.6; }

  /* ── STATS ── */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; animation: fadeUp 0.6s ease 0.1s both; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; transition: all 0.3s ease; }
  .stat-card:hover { border-color: var(--border-light); transform: translateY(-1px); }
  .stat-number { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }

  /* ── PROGRESS ── */
  .global-progress { margin-bottom: 36px; animation: fadeUp 0.6s ease 0.15s both; }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .progress-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); }
  .progress-pct { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent-gold); }
  .progress-track { height: 6px; background: var(--bg-card); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-gold-dim), var(--accent-gold)); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; animation: fadeUp 0.6s ease 0.2s both; }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px; }
  .search-input {
    width: 100%; padding: 12px 14px 12px 40px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: all 0.25s ease;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent-gold-dim); box-shadow: 0 0 0 3px var(--accent-gold-glow); }
  .filter-btn {
    padding: 10px 18px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.25s ease; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-light); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent-gold-glow); border-color: var(--accent-gold-dim); color: var(--accent-gold); }

  /* ── CATEGORIES ── */
  .category { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg-secondary); transition: border-color 0.3s ease; }
  .category:hover { border-color: var(--border-light); }
  .category-header { display: flex; align-items: center; padding: 18px 20px; cursor: pointer; user-select: none; gap: 16px; transition: background 0.2s ease; }
  .category-header:hover { background: var(--bg-card); }
  .category-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .category-info { flex: 1; }
  .category-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; line-height: 1.1; }
  .category-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--text-muted); margin-top: 2px; }
  .category-progress-mini { width: 80px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-right: 8px; }
  .category-progress-mini-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .chevron { width: 20px; height: 20px; color: var(--text-muted); transition: transform 0.3s ease; flex-shrink: 0; }
  .category.open .chevron { transform: rotate(180deg); }
  .category-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
  .category.open .category-body { max-height: 4000px; }
  .topic-list { padding: 4px 12px 12px; }

  /* ── TOPICS ── */
  .topic-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 12px; border-radius: 8px; transition: all 0.2s ease; cursor: pointer; animation: fadeUp 0.3s ease both; }
  .topic-item:hover { background: var(--bg-card-hover); }
  .topic-item + .topic-item { border-top: 1px solid rgba(255,255,255,0.03); }
  .topic-checkbox {
    width: 22px; height: 22px; border: 2px solid var(--border-light); border-radius: 6px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease; margin-top: 1px;
  }
  .topic-checkbox:hover { border-color: var(--accent-gold-dim); }
  .topic-checkbox.checked { background: var(--accent-gold); border-color: var(--accent-gold); }
  .topic-checkbox.checked svg { opacity: 1; transform: scale(1); }
  .topic-checkbox.syncing { opacity: 0.5; animation: pulse 0.5s ease infinite; }
  .topic-checkbox svg { width: 13px; height: 13px; color: var(--bg-primary); opacity: 0; transform: scale(0.5); transition: all 0.2s ease; }
  .topic-text { font-size: 14px; line-height: 1.65; color: var(--text-primary); flex: 1; transition: all 0.3s ease; }
  .topic-item.completed .topic-text { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--text-muted); }
  .topic-number { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); min-width: 22px; margin-top: 3px; flex-shrink: 0; }
  .topic-row-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); opacity: 0.35; margin-top: 4px; flex-shrink: 0; }

  /* ── STATES ── */
  .loading-state { text-align: center; padding: 80px 20px; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent-gold); border-radius: 50%; margin: 0 auto 20px; animation: spin 0.8s linear infinite; }
  .loading-text { color: var(--text-secondary); font-size: 14px; }
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state-text { font-size: 15px; color: var(--text-secondary); }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 20px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards; max-width: 340px; }
  .toast.success { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); color: var(--accent-green); }
  .toast.error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--accent-red); }
  .toast.info { background: rgba(212,168,83,0.15); border: 1px solid rgba(212,168,83,0.3); color: var(--accent-gold); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(40px); } }

  @media (max-width: 600px) {
    .app { padding: 24px 16px 60px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .toolbar { flex-direction: column; }
    .setup-row { flex-direction: column; }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── SHARED TOP HEADER ── */
  .top-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center; gap: 2rem;
    padding: 1rem 24px; background: rgba(10,10,12,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .top-header a {
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.85rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: #4ade80;
    text-decoration: none; transition: color 0.3s, border-color 0.3s;
    padding: 6px 0; border-bottom: 2px solid transparent;
  }
  .top-header a:hover { color: #4ade80; border-bottom-color: #4ade80; }
  .top-header a.active { color: #d4a853; border-bottom-color: #d4a853; }
  .top-header .back-arrow {
    display: flex; align-items: center; gap: 4px; border-bottom: none; padding: 6px 8px;
    font-size: 0.9rem; letter-spacing: 0;
  }
  .top-header .back-arrow:hover { color: #4ade80; }
  .nav-dropdown { position: relative; }
  .nav-dropdown-trigger {
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.85rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: #4ade80;
    cursor: pointer; padding: 6px 0; border-bottom: 2px solid transparent;
    transition: color 0.3s, border-color 0.3s; display: flex; align-items: center; gap: 4px;
  }
  .nav-dropdown-trigger::after { content: '▾'; font-size: 0.7em; opacity: 0.7; }
  .nav-dropdown:hover .nav-dropdown-trigger { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }
  .nav-dropdown-menu {
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    margin-top: 8px; min-width: 220px;
    background: rgba(10,10,14,0.98); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
    padding: 8px 0; opacity: 0; visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .nav-dropdown:hover .nav-dropdown-menu { opacity: 1; visibility: visible; }
  .nav-dropdown-menu a {
    display: block; padding: 10px 20px; font-size: 0.8rem;
    letter-spacing: 0.1em; color: var(--text-secondary); text-decoration: none;
    border-bottom: none; transition: color 0.2s, background 0.2s;
  }
  .nav-dropdown-menu a:hover { color: var(--accent-gold); background: rgba(212,168,83,0.08); }

  /* ── LOCK SCREEN ── */
  .lock-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg-primary);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .lock-overlay.hidden { display: none; }
  .lock-card {
    text-align: center; padding: 48px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 380px; width: 90%;
    animation: fadeUp 0.4s ease both;
  }
  .lock-icon { font-size: 48px; margin-bottom: 16px; }
  .lock-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px;
    color: var(--accent-gold); margin-bottom: 8px;
  }
  .lock-card p {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 24px; line-height: 1.5;
  }
  .lock-input {
    width: 100%; padding: 12px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  .lock-input:focus { border-color: var(--accent-gold); }
  .lock-input::placeholder { color: var(--text-muted); }
  .lock-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dim));
    border: none; border-radius: 8px;
    color: #000; font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .lock-btn:hover { opacity: 0.9; }
  .lock-error {
    color: var(--accent-red);
    font-size: 12px; margin-top: 12px;
    min-height: 18px;
  }
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <h2>Research Journal</h2>
    <p>This journal is password-protected.<br>Enter the password to continue.</p>
    <input type="password" class="lock-input" id="lockInput" placeholder="Enter password..." autocomplete="off">
    <button class="lock-btn" id="lockBtn">Unlock</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<nav class="top-header" id="siteNav" style="display:none;">
  <a href="index.html" class="back-arrow" title="Back to Home">← Home</a>
  <div class="nav-dropdown">
    <span class="nav-dropdown-trigger">Knowledge</span>
    <div class="nav-dropdown-menu">
      <a href="timeline.html">History Timeline</a>
      <a href="todays-problems.html">Today's Societal Issues</a>
      <a href="culture.html">Culture</a>
    </div>
  </div>
  <a href="future.html">Future</a>
</nav>

<div class="app" id="app" style="margin-top: 54px; display:none;"></div>
<div class="toast-container" id="toasts"></div>

<script>
// ══════════════════════════════════════════════════════════════
// PASSWORD LOCK
// ══════════════════════════════════════════════════════════════
(function() {
  var HASH = 1073779479;
  var overlay = document.getElementById('lockOverlay');
  var input   = document.getElementById('lockInput');
  var btn     = document.getElementById('lockBtn');
  var err     = document.getElementById('lockError');
  var nav     = document.getElementById('siteNav');
  var app     = document.getElementById('app');

  function hashStr(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i);
      h |= 0;
    }
    return h;
  }

  function tryUnlock() {
    var pw = input.value;
    if (!pw) { err.textContent = 'Please enter a password.'; return; }
    if (hashStr(pw) === HASH) {
      overlay.classList.add('hidden');
      nav.style.display = '';
      app.style.display = '';
      try { sessionStorage.setItem('rj_unlocked', '1'); } catch(e) {}
      window._rjUnlocked = true;
      if (typeof window._rjBoot === 'function') window._rjBoot();
    } else {
      err.textContent = 'Incorrect password.';
      input.value = '';
      input.focus();
    }
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryUnlock(); });

  try {
    if (sessionStorage.getItem('rj_unlocked') === '1') {
      overlay.classList.add('hidden');
      nav.style.display = '';
      app.style.display = '';
      window._rjUnlocked = true;
    }
  } catch(e) {}
})();

// CONFIG
// ══════════════════════════════════════════════════════════════
var SHEET_ID = '1RhQ4mWTyBVelcD6vAYbB0ylyxAU8P3PNSrrU0JOsW2o';
var CATEGORY_META = {
  'History':          { icon: '📜', color: '#d4a853' },
  'Art':              { icon: '🎨', color: '#f472b6' },
  'Science':          { icon: '🔬', color: '#60a5fa' },
  'Climate Change':   { icon: '🌍', color: '#4ade80' },
  'Money & Power':    { icon: '💰', color: '#fb923c' },
  'Social & Society': { icon: '✊', color: '#a78bfa' },
  'THE GOATS 🐐':    { icon: '👑', color: '#22d3ee' }
};

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var isIframe = false;
try { isIframe = (window.self !== window.top); } catch(e) { isIframe = true; }

var scriptUrl = '';
try { scriptUrl = localStorage.getItem('rj_script_url') || ''; } catch(e) {}

var categories = [];
var searchQuery = '';
var filterMode = 'all';
var openCategories = new Set();
var syncStatus = 'disconnected';
var lastSync = null;
var syncingRows = new Set();

// ══════════════════════════════════════════════════════════════
// JSONP  — injects a <script> tag so the browser fetches the
// Apps Script URL as JavaScript, completely bypassing CORS.
// The Apps Script wraps its JSON in a callback function.
// ══════════════════════════════════════════════════════════════
var _cbId = 0;

function callApi(params) {
  return new Promise(function(resolve, reject) {
    var name = '__rj' + (_cbId++);
    var script = null;
    var timer = setTimeout(function() { cleanup(); reject(new Error('Timed out (15s)')); }, 15000);

    function cleanup() {
      clearTimeout(timer);
      try { delete window[name]; } catch(e) { window[name] = undefined; }
      if (script && script.parentNode) script.parentNode.removeChild(script);
    }

    window[name] = function(data) { cleanup(); resolve(data); };

    var qs = 'callback=' + name;
    var keys = Object.keys(params);
    for (var i = 0; i < keys.length; i++) {
      qs += '&' + encodeURIComponent(keys[i]) + '=' + encodeURIComponent(params[keys[i]]);
    }

    script = document.createElement('script');
    script.src = scriptUrl + '?' + qs;
    script.onerror = function() {
      cleanup();
      reject(new Error('Failed to reach Apps Script — check URL and deployment'));
    };
    document.body.appendChild(script);
  });
}

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
function fetchSheetData() {
  if (!scriptUrl) return;
  syncStatus = 'syncing';
  render();

  callApi({ action: 'read' }).then(function(data) {
    if (data.success) {
      parseSheetData(data.data);
      syncStatus = 'live';
      lastSync = new Date();
    } else {
      syncStatus = 'error';
      toast('Read error: ' + (data.error || 'unknown'), 'error');
    }
    render();
  }).catch(function(err) {
    syncStatus = 'error';
    toast('Sync failed: ' + err.message, 'error');
    render();
  });
}

function toggleCheckbox(row) {
  if (!scriptUrl || syncingRows.has(row)) return;

  // Optimistic flip
  syncingRows.add(row);
  flipLocal(row);
  render();

  callApi({ action: 'toggle', row: row }).then(function(data) {
    if (data.success) {
      setLocal(row, data.value);
      lastSync = new Date();
      syncStatus = 'live';
      toast('Synced ✓', 'success');
    } else {
      flipLocal(row); // revert
      toast('Error: ' + (data.error || 'unknown'), 'error');
    }
    syncingRows.delete(row);
    render();
  }).catch(function(err) {
    flipLocal(row); // revert
    syncingRows.delete(row);
    toast('Failed: ' + err.message, 'error');
    render();
  });
}

function flipLocal(row) {
  for (var i = 0; i < categories.length; i++)
    for (var j = 0; j < categories[i].topics.length; j++)
      if (categories[i].topics[j].row === row) { categories[i].topics[j].done = !categories[i].topics[j].done; return; }
}
function setLocal(row, val) {
  for (var i = 0; i < categories.length; i++)
    for (var j = 0; j < categories[i].topics.length; j++)
      if (categories[i].topics[j].row === row) { categories[i].topics[j].done = val; return; }
}

// ══════════════════════════════════════════════════════════════
// PARSE ROWS → CATEGORIES
// ══════════════════════════════════════════════════════════════
function parseSheetData(rows) {
  categories = [];
  var currentCat = null;
  var knownNames = Object.keys(CATEGORY_META);

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var text = (r.text || '').trim();
    if (!text || r.row === 1) continue;

    // Category header: no checkbox + name matches
    if ((r.checkbox === null || r.checkbox === '' || r.checkbox === undefined || r.checkbox === 'undefined') && knownNames.indexOf(text) >= 0) {
      var meta = CATEGORY_META[text] || { icon: '📂', color: '#8a8a96' };
      currentCat = { name: text, icon: meta.icon, color: meta.color, topics: [] };
      categories.push(currentCat);
      continue;
    }

    // Topic: has checkbox
    if (currentCat && (r.checkbox === true || r.checkbox === false)) {
      currentCat.topics.push({ text: text, done: r.checkbox, row: r.row });
    }
  }

  openCategories = new Set();
  for (var k = 0; k < categories.length; k++) openCategories.add(k);
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 3100);
}

function getStats() {
  var total = 0, done = 0;
  categories.forEach(function(c) { c.topics.forEach(function(t) { total++; if (t.done) done++; }); });
  return { total: total, completed: done, pending: total - done, pct: total ? Math.round((done / total) * 100) : 0 };
}
function getCatStats(cat) {
  var t = cat.topics.length, d = cat.topics.filter(function(x) { return x.done; }).length;
  return { total: t, completed: d, pct: t ? Math.round((d / t) * 100) : 0 };
}
function getFiltered(cat) {
  return cat.topics.filter(function(t) {
    var s = !searchQuery || t.text.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0;
    var f = filterMode === 'all' || (filterMode === 'completed' && t.done) || (filterMode === 'pending' && !t.done);
    return s && f;
  });
}
function hl(text) {
  if (!searchQuery) return text;
  var re = new RegExp('(' + searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:var(--accent-gold-glow);color:var(--accent-gold);padding:1px 3px;border-radius:3px;">$1</mark>');
}
function timeAgo(d) {
  if (!d) return '';
  var s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  var app = document.getElementById('app');

  // ── IFRAME WARNING ──
  if (isIframe) {
    app.innerHTML =
      '<div class="header">' +
        '<div class="header-label">Max Miesen · USC</div>' +
        '<h1>RESEARCH <span>JOURNAL</span></h1>' +
      '</div>' +
      '<div class="iframe-warning">' +
        '<div class="iframe-warning-icon">🌐</div>' +
        '<h2>OPEN IN YOUR BROWSER</h2>' +
        '<p>This app connects to Google Sheets and needs to run in a real browser tab. Claude\'s preview sandbox blocks external network requests.</p>' +
        '<div class="step-list">' +
          '<div><span class="step-num">1</span> Download this file (click the download button above)</div>' +
          '<div><span class="step-num">2</span> Open the downloaded .html file in Chrome/Safari/Firefox</div>' +
          '<div><span class="step-num">3</span> Follow the setup steps to connect your Google Sheet</div>' +
        '</div>' +
      '</div>';
    return;
  }

  // ── SETUP SCREEN ──
  if (!scriptUrl) {
    app.innerHTML =
      '<div class="header">' +
        '<div class="header-label">Max Miesen · USC</div>' +
        '<h1>RESEARCH <span>JOURNAL</span></h1>' +
        '<p class="header-subtitle">Connect to your Google Sheet to sync topics and progress in real-time.</p>' +
      '</div>' +
      '<div class="setup-banner">' +
        '<h3>CONNECT TO GOOGLE SHEETS</h3>' +
        '<p>' +
          '1. Open your <a href="https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/edit" target="_blank" style="color:var(--accent-gold)">Google Sheet</a><br>' +
          '2. Go to <code>Extensions → Apps Script</code><br>' +
          '3. Paste the Apps Script code (provided with this file)<br>' +
          '4. Click <code>Deploy → New deployment → Web app</code><br>' +
          '5. Set <code>Execute as: Me</code> &amp; <code>Who has access: Anyone</code><br>' +
          '6. Copy the deployment URL and paste it below' +
        '</p>' +
        '<div class="setup-row">' +
          '<input class="setup-input" id="urlInput" type="text" placeholder="https://script.google.com/macros/s/...../exec" />' +
          '<button class="setup-btn" id="connectBtn">Connect</button>' +
        '</div>' +
      '</div>';
    document.getElementById('connectBtn').addEventListener('click', doConnect);
    document.getElementById('urlInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') doConnect(); });
    return;
  }

  // ── LOADING ──
  if (categories.length === 0 && syncStatus === 'syncing') {
    app.innerHTML =
      '<div class="header"><div class="header-label">Max Miesen · USC</div><h1>RESEARCH <span>JOURNAL</span></h1></div>' +
      '<div class="loading-state"><div class="loading-spinner"></div><div class="loading-text">Fetching from Google Sheets...</div></div>';
    return;
  }

  // ── MAIN VIEW ──
  var stats = getStats();
  var visible = [];
  for (var ci = 0; ci < categories.length; ci++) {
    var f = getFiltered(categories[ci]);
    if (f.length > 0) visible.push({ cat: categories[ci], idx: ci, filtered: f });
  }
  var topicNum = 0;

  var html = '';

  // Header
  html += '<div class="header"><div class="header-label">Max Miesen · USC</div>';
  html += '<h1>RESEARCH <span>JOURNAL</span></h1>';
  html += '<p class="header-subtitle">Research, learn, journal, essays — what we can do individually, as a group, as a nation, as a world.</p></div>';

  // Sync bar
  var dotClass = syncStatus === 'live' ? 'live' : syncStatus === 'syncing' ? 'syncing' : syncStatus === 'error' ? 'error' : '';
  var statusText = syncStatus === 'live' ? 'Connected to Google Sheets' : syncStatus === 'syncing' ? 'Syncing...' : syncStatus === 'error' ? 'Connection error' : 'Disconnected';
  html += '<div class="sync-bar"><div class="sync-dot ' + dotClass + '"></div>';
  html += '<span>' + statusText + (lastSync ? ' · ' + timeAgo(lastSync) : '') + '</span>';
  html += '<div class="sync-actions"><button class="sync-btn" id="refreshBtn">↻ Refresh</button>';
  html += '<button class="sync-btn danger" id="disconnectBtn">Disconnect</button></div></div>';

  // Stats
  html += '<div class="stats-bar">';
  html += '<div class="stat-card"><div class="stat-number" style="color:var(--text-primary)">' + stats.total + '</div><div class="stat-label">Total Topics</div></div>';
  html += '<div class="stat-card"><div class="stat-number" style="color:var(--accent-gold)">' + stats.completed + '</div><div class="stat-label">Completed</div></div>';
  html += '<div class="stat-card"><div class="stat-number" style="color:var(--text-secondary)">' + stats.pending + '</div><div class="stat-label">Remaining</div></div>';
  html += '<div class="stat-card"><div class="stat-number" style="color:var(--accent-green)">' + categories.length + '</div><div class="stat-label">Categories</div></div>';
  html += '</div>';

  // Progress
  html += '<div class="global-progress"><div class="progress-header"><span class="progress-title">Overall Progress</span>';
  html += '<span class="progress-pct">' + stats.pct + '%</span></div>';
  html += '<div class="progress-track"><div class="progress-fill" style="width:' + stats.pct + '%"></div></div></div>';

  // Toolbar
  html += '<div class="toolbar"><div class="search-wrap">';
  html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';
  html += '<input class="search-input" type="text" placeholder="Search topics..." value="' + searchQuery + '" id="searchInput"></div>';
  html += '<button class="filter-btn ' + (filterMode === 'all' ? 'active' : '') + '" data-filter="all">All</button>';
  html += '<button class="filter-btn ' + (filterMode === 'pending' ? 'active' : '') + '" data-filter="pending">Pending</button>';
  html += '<button class="filter-btn ' + (filterMode === 'completed' ? 'active' : '') + '" data-filter="completed">Done</button></div>';

  if (visible.length === 0) {
    html += '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No topics match your search</div></div>';
  }

  // Categories
  for (var v = 0; v < visible.length; v++) {
    var cat = visible[v].cat, idx = visible[v].idx, filtered = visible[v].filtered;
    var cs = getCatStats(cat);
    var isOpen = openCategories.has(idx);

    html += '<div class="category ' + (isOpen ? 'open' : '') + '" data-cat="' + idx + '">';
    html += '<div class="category-header" data-toggle="' + idx + '">';
    html += '<div class="category-icon" style="background:' + cat.color + '18;color:' + cat.color + '">' + cat.icon + '</div>';
    html += '<div class="category-info"><div class="category-name" style="color:' + cat.color + '">' + cat.name.toUpperCase() + '</div>';
    html += '<div class="category-meta">' + cs.completed + '/' + cs.total + ' completed</div></div>';
    html += '<div class="category-progress-mini"><div class="category-progress-mini-fill" style="width:' + cs.pct + '%;background:' + cat.color + '"></div></div>';
    html += '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
    html += '</div><div class="category-body"><div class="topic-list">';

    for (var ti = 0; ti < filtered.length; ti++) {
      var topic = filtered[ti];
      topicNum++;
      var isSyncing = syncingRows.has(topic.row);
      html += '<div class="topic-item ' + (topic.done ? 'completed' : '') + '" style="animation-delay:' + (ti * 0.03) + 's" data-row="' + topic.row + '">';
      html += '<span class="topic-number">' + String(topicNum).padStart(2, '0') + '</span>';
      html += '<div class="topic-checkbox ' + (topic.done ? 'checked' : '') + ' ' + (isSyncing ? 'syncing' : '') + '">';
      html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>';
      html += '<span class="topic-text">' + hl(topic.text) + '</span>';
      html += '<span class="topic-row-tag">R' + topic.row + '</span></div>';
    }

    html += '</div></div></div>';
  }

  app.innerHTML = html;

  // ── BIND EVENTS ──
  var si = document.getElementById('searchInput');
  if (si) si.addEventListener('input', function(e) {
    searchQuery = e.target.value;
    render();
    var el = document.getElementById('searchInput');
    if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  });

  var filterBtns = document.querySelectorAll('.filter-btn');
  for (var fb = 0; fb < filterBtns.length; fb++) {
    filterBtns[fb].addEventListener('click', function() { filterMode = this.getAttribute('data-filter'); render(); });
  }

  var toggleBtns = document.querySelectorAll('[data-toggle]');
  for (var tb = 0; tb < toggleBtns.length; tb++) {
    toggleBtns[tb].addEventListener('click', function() {
      var i = parseInt(this.getAttribute('data-toggle'));
      openCategories.has(i) ? openCategories.delete(i) : openCategories.add(i);
      render();
    });
  }

  var topicItems = document.querySelectorAll('.topic-item');
  for (var ti2 = 0; ti2 < topicItems.length; ti2++) {
    topicItems[ti2].addEventListener('click', function() {
      toggleCheckbox(parseInt(this.getAttribute('data-row')));
    });
  }

  var rb = document.getElementById('refreshBtn');
  if (rb) rb.addEventListener('click', fetchSheetData);

  var db = document.getElementById('disconnectBtn');
  if (db) db.addEventListener('click', function() {
    scriptUrl = '';
    try { localStorage.removeItem('rj_script_url'); } catch(e) {}
    categories = [];
    syncStatus = 'disconnected';
    render();
  });
}

function doConnect() {
  var url = document.getElementById('urlInput').value.trim();
  if (url.indexOf('https://script.google.com/') !== 0) {
    toast('Enter a valid Apps Script URL starting with https://script.google.com/', 'error');
    return;
  }
  scriptUrl = url;
  try { localStorage.setItem('rj_script_url', url); } catch(e) {}
  toast('Connecting...', 'info');
  fetchSheetData();
}

// ── INIT ──
function boot() {
  render();
  if (scriptUrl && !isIframe) fetchSheetData();
}
window._rjBoot = boot;
if (window._rjUnlocked) boot();
</script>
</body>
</html>
